name: NuGet

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/nuget.yml'
      - 'nuget/**'
      - 'scripts/nuget/**'
      - 'CMakeLists.txt'
      - 'LICENSE'
      - 'README.md'
      - 'build.bat'
      - 'build_all.bat'
      - 'cmake/**'
      - 'docs/**'
      - 'include/**'
      - 'src/**'
  push:
    branches: [ main ]
    tags:
      - 'v*'
    paths:
      - '.github/workflows/nuget.yml'
      - 'nuget/**'
      - 'scripts/nuget/**'
      - 'CMakeLists.txt'
      - 'LICENSE'
      - 'README.md'
      - 'build.bat'
      - 'build_all.bat'
      - 'cmake/**'
      - 'docs/**'
      - 'include/**'
      - 'src/**'
  workflow_dispatch:
    inputs:
      package_version:
        description: Optional package version override
        required: false
        type: string
      publish:
        description: Publish the generated package to nuget.org
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  pack:
    name: Pack NuGet
    runs-on: windows-2022
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          $version = '${{ inputs.package_version }}'
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = ./scripts/nuget/Get-CrtSysVersion.ps1
          }

          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            if ($env:GITHUB_REF_NAME -notmatch '^v(.+)$') {
              throw "Release tag must use v<version> format."
            }

            $tagVersion = $Matches[1]
            if ($version -ne $tagVersion) {
              throw "Package version '$version' does not match tag version '$tagVersion'."
            }
          }

          "package_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Package version: $version"

      - name: Build prebuilt libraries
        shell: pwsh
        run: ./scripts/nuget/Build-CrtSysNuGetLibs.ps1 -Architecture x64,ARM64 -Configuration Release -WindowsSdkVersion '10.0.22621.0'

      - name: Pack
        shell: pwsh
        run: ./scripts/nuget/Pack-CrtSysNuGet.ps1 -Version '${{ steps.version.outputs.package_version }}'

      - uses: actions/upload-artifact@v7
        with:
          name: crtsys-nuget-${{ steps.version.outputs.package_version }}
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error

  test-package:
    name: Test NuGet package ${{ matrix.arch }}
    needs: pack
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, ARM64]

    steps:
      - uses: actions/checkout@v5

      - uses: NuGet/setup-nuget@v2

      - uses: actions/download-artifact@v7
        with:
          name: crtsys-nuget-${{ needs.pack.outputs.package_version }}
          path: artifacts/nuget

      - name: Build package consumer smoke project
        shell: pwsh
        run: >
          ./scripts/nuget/Test-CrtSysNuGetPackage.ps1
          -PackageDirectory artifacts/nuget
          -Version '${{ needs.pack.outputs.package_version }}'
          -Architecture '${{ matrix.arch }}'
          -WindowsSdkVersion '10.0.22621.0'

  publish:
    name: Publish NuGet
    needs: [pack, test-package]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: windows-2022
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - uses: actions/download-artifact@v7
        with:
          name: crtsys-nuget-${{ needs.pack.outputs.package_version }}
          path: artifacts/nuget

      - name: Validate NuGet trusted publishing user
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace('${{ vars.NUGET_TRUSTED_PUBLISHING_USER }}')) {
            throw 'Repository variable NUGET_TRUSTED_PUBLISHING_USER is required for NuGet Trusted Publishing.'
          }

      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_TRUSTED_PUBLISHING_USER }}

      - name: Publish to nuget.org
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: ./scripts/nuget/Push-CrtSysNuGet.ps1 -SkipDuplicate
