name: CMake

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_driver_load_tests:
        description: Run the x64 driver load test on a prepared self-hosted runner
        type: boolean
        default: false

permissions:
  contents: read
  actions: read

env:
  CRTSYS_WINDOWS_SDK_VERSION: 10.0.22621.0
  CRTSYS_VS2026_WINDOWS_SDK_VERSION: 10.0.26100.0

jobs:
  validate-example-projects:
    name: Validate Visual Studio example projects
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v5

      - name: Validate shared package consumption
        shell: pwsh
        run: ./scripts/ci/Test-CrtSysExampleProjects.ps1

      - name: Reject hard-coded NTSTATUS values
        shell: pwsh
        run: ./scripts/ci/Test-NoHardcodedNtStatus.ps1

  build-vs2022:
    name: VS2022/v143 ${{ matrix.project }} ${{ matrix.arch }} ${{ matrix.config }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: app
            arch: x86
            config: Debug
          - project: app
            arch: x64
            config: Debug
          - project: app
            arch: ARM
            config: Debug
          - project: app
            arch: ARM64
            config: Debug
          - project: driver
            arch: x86
            config: Debug
          - project: driver
            arch: x64
            config: Debug
          - project: driver
            arch: ARM
            config: Debug
          - project: driver
            arch: ARM64
            config: Debug
          - project: app
            arch: x86
            config: Release
          - project: app
            arch: x64
            config: Release
          - project: app
            arch: ARM
            config: Release
          - project: app
            arch: ARM64
            config: Release
          - project: driver
            arch: x86
            config: Release
          - project: driver
            arch: x64
            config: Release
          - project: driver
            arch: ARM
            config: Release
          - project: driver
            arch: ARM64
            config: Release

    steps:
      - uses: actions/checkout@v4

      - name: Show VS2022 toolchain
        shell: pwsh
        run: |
          cmake --version

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          & $vswhere -latest -products * -property installationPath

          Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\Include" -Directory |
            Select-Object -ExpandProperty Name

      - name: Ensure WDK for x86 driver build
        if: matrix.project == 'driver' && matrix.arch == 'x86'
        shell: pwsh
        run: ./scripts/nuget/Ensure-CrtSysWdk.ps1 -WindowsSdkVersion '${{ env.CRTSYS_WINDOWS_SDK_VERSION }}' -RequiredPlatforms x86

      - name: Ensure WDK for ARM32 driver build
        if: matrix.project == 'driver' && matrix.arch == 'ARM'
        shell: pwsh
        run: ./scripts/nuget/Ensure-CrtSysWdk.ps1 -WindowsSdkVersion '${{ env.CRTSYS_WINDOWS_SDK_VERSION }}' -RequiredPlatforms ARM

      - name: Build v143
        shell: pwsh
        run: |
          $parameters = @{
            Project = '${{ matrix.project }}'
            Architecture = '${{ matrix.arch }}'
            Configuration = '${{ matrix.config }}'
            WindowsSdkVersion = '${{ env.CRTSYS_WINDOWS_SDK_VERSION }}'
          }

          if ($parameters.Project -eq 'driver') {
            $parameters.NoBreakpoint = $true
          }

          ./scripts/ci/Build-CrtSys.ps1 @parameters

      - name: Build KMDF Verifier stress fixture
        if: matrix.project == 'driver' && matrix.arch == 'x64' && matrix.config == 'Debug'
        shell: pwsh
        run: |
          ./scripts/ci/Build-CrtSys.ps1 `
            -Project kmdf-verifier-stress `
            -Architecture x64 `
            -Configuration Debug `
            -WindowsSdkVersion '${{ env.CRTSYS_WINDOWS_SDK_VERSION }}'

      - name: Build RPC lifecycle, async, notification, and security fixtures
        if: matrix.project == 'driver' && matrix.arch == 'x64' && matrix.config == 'Debug'
        shell: pwsh
        run: |
          ./scripts/ci/Build-CrtSys.ps1 `
            -Project rpc-lifecycle-stress `
            -Architecture x64 `
            -Configuration Debug `
            -WindowsSdkVersion '${{ env.CRTSYS_WINDOWS_SDK_VERSION }}'

          ./scripts/ci/Build-CrtSys.ps1 `
            -Project rpc-async `
            -Architecture x64 `
            -Configuration Debug `
            -WindowsSdkVersion '${{ env.CRTSYS_WINDOWS_SDK_VERSION }}'

          ./scripts/ci/Build-CrtSys.ps1 `
            -Project rpc-notifications `
            -Architecture x64 `
            -Configuration Debug `
            -WindowsSdkVersion '${{ env.CRTSYS_WINDOWS_SDK_VERSION }}'

          ./scripts/ci/Build-CrtSys.ps1 `
            -Project rpc-security `
            -Architecture x64 `
            -Configuration Debug `
            -WindowsSdkVersion '${{ env.CRTSYS_WINDOWS_SDK_VERSION }}'

      - name: Build x86 RPC notification and security fixtures
        if: matrix.project == 'driver' && matrix.arch == 'x86' && matrix.config == 'Debug'
        shell: pwsh
        run: |
          ./scripts/ci/Build-CrtSys.ps1 `
            -Project rpc-notifications `
            -Architecture x86 `
            -Configuration Debug `
            -WindowsSdkVersion '${{ env.CRTSYS_WINDOWS_SDK_VERSION }}'

          ./scripts/ci/Build-CrtSys.ps1 `
            -Project rpc-security `
            -Architecture x86 `
            -Configuration Debug `
            -WindowsSdkVersion '${{ env.CRTSYS_WINDOWS_SDK_VERSION }}'

      - name: Test-sign driver
        if: matrix.project == 'driver' && matrix.config == 'Debug'
        shell: pwsh
        run: ./scripts/ci/TestSign-Driver.ps1 -DriverPath test\cmake\driver\build_${{ matrix.arch }}\Debug\crtsys_test.sys

      - name: Upload signed driver
        if: matrix.project == 'driver' && matrix.config == 'Debug'
        uses: actions/upload-artifact@v4
        with:
          name: crtsys-test-driver-${{ matrix.arch }}
          path: |
            test/cmake/driver/build_${{ matrix.arch }}/Debug/crtsys_test.sys
            test/cmake/driver/build_${{ matrix.arch }}/Debug/crtsys_test.pdb

      - name: Upload x64 test app
        if: matrix.project == 'app' && matrix.arch == 'x64' && matrix.config == 'Debug'
        uses: actions/upload-artifact@v4
        with:
          name: crtsys-test-app-x64
          path: |
            test/cmake/app/build_x64/Debug/crtsys_test_app.exe
            test/cmake/app/build_x64/Debug/crtsys_test_app.pdb

  build-vs2019:
    name: VS2019/v142 ${{ matrix.project }} ${{ matrix.arch }} ${{ matrix.config }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: app
            arch: x86
            config: Debug
          - project: app
            arch: x64
            config: Debug
          - project: app
            arch: ARM
            config: Debug
          - project: app
            arch: ARM64
            config: Debug
          - project: driver
            arch: x86
            config: Debug
          - project: driver
            arch: x64
            config: Debug
          - project: driver
            arch: ARM
            config: Debug
          - project: driver
            arch: ARM64
            config: Debug
          - project: app
            arch: x86
            config: Release
          - project: app
            arch: x64
            config: Release
          - project: app
            arch: ARM
            config: Release
          - project: app
            arch: ARM64
            config: Release
          - project: driver
            arch: x86
            config: Release
          - project: driver
            arch: x64
            config: Release
          - project: driver
            arch: ARM
            config: Release
          - project: driver
            arch: ARM64
            config: Release

    steps:
      - uses: actions/checkout@v4

      - name: Show v142 toolchain
        shell: pwsh
        run: |
          cmake --version

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installationPath = & $vswhere -latest -products * -property installationPath
          Write-Host "Visual Studio installation: $installationPath"

          Get-ChildItem (Join-Path $installationPath 'VC\Tools\MSVC') -Directory |
            Select-Object -ExpandProperty Name

      - name: Ensure WDK for x86 driver build
        if: matrix.project == 'driver' && matrix.arch == 'x86'
        shell: pwsh
        run: ./scripts/nuget/Ensure-CrtSysWdk.ps1 -WindowsSdkVersion '${{ env.CRTSYS_WINDOWS_SDK_VERSION }}' -RequiredPlatforms x86

      - name: Ensure WDK for ARM32 driver build
        if: matrix.project == 'driver' && matrix.arch == 'ARM'
        shell: pwsh
        run: ./scripts/nuget/Ensure-CrtSysWdk.ps1 -WindowsSdkVersion '${{ env.CRTSYS_WINDOWS_SDK_VERSION }}' -RequiredPlatforms ARM

      - name: Build v142
        shell: pwsh
        run: |
          $parameters = @{
            Project = '${{ matrix.project }}'
            Architecture = '${{ matrix.arch }}'
            Configuration = '${{ matrix.config }}'
            WindowsSdkVersion = '${{ env.CRTSYS_WINDOWS_SDK_VERSION }}'
            PlatformToolset = 'v142'
          }

          if ($parameters.Project -eq 'driver') {
            $parameters.NoBreakpoint = $true
          }

          ./scripts/ci/Build-CrtSys.ps1 @parameters

  build-vs2026:
    name: VS2026/v145 ${{ matrix.project }} ${{ matrix.arch }} ${{ matrix.config }}
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: app
            arch: x86
            config: Debug
          - project: app
            arch: x64
            config: Debug
          - project: app
            arch: ARM64
            config: Debug
          - project: driver
            arch: x86
            config: Debug
          - project: driver
            arch: x64
            config: Debug
          - project: driver
            arch: ARM64
            config: Debug
          - project: app
            arch: x86
            config: Release
          - project: app
            arch: x64
            config: Release
          - project: app
            arch: ARM64
            config: Release
          - project: driver
            arch: x86
            config: Release
          - project: driver
            arch: x64
            config: Release
          - project: driver
            arch: ARM64
            config: Release

    steps:
      - uses: actions/checkout@v4

      - name: Show VS2026 toolchain
        shell: pwsh
        run: |
          cmake --version

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installationPath = & $vswhere -latest -products * -property installationPath
          Write-Host "Visual Studio installation: $installationPath"

          Get-ChildItem (Join-Path $installationPath 'VC\Tools\MSVC') -Directory |
            Select-Object -ExpandProperty Name

      - name: Ensure WDK for VS2026 image
        shell: pwsh
        run: ./scripts/nuget/Ensure-CrtSysWdk.ps1 -WindowsSdkVersion '${{ env.CRTSYS_VS2026_WINDOWS_SDK_VERSION }}'

      - name: Ensure WDK for VS2026 x86 driver build
        if: matrix.project == 'driver' && matrix.arch == 'x86'
        shell: pwsh
        run: ./scripts/nuget/Ensure-CrtSysWdk.ps1 -WindowsSdkVersion '${{ env.CRTSYS_WINDOWS_SDK_VERSION }}' -RequiredPlatforms x86

      - name: Build v145
        shell: pwsh
        run: |
          $windowsSdkVersion = '${{ env.CRTSYS_VS2026_WINDOWS_SDK_VERSION }}'
          $wdkVersion = ''
          if ('${{ matrix.project }}' -eq 'driver' -and '${{ matrix.arch }}' -eq 'x86') {
            $wdkVersion = '${{ env.CRTSYS_WINDOWS_SDK_VERSION }}'
          }

          $parameters = @{
            Project = '${{ matrix.project }}'
            Architecture = '${{ matrix.arch }}'
            Configuration = '${{ matrix.config }}'
            WindowsSdkVersion = $windowsSdkVersion
            PlatformToolset = 'v145'
          }

          if (-not [string]::IsNullOrWhiteSpace($wdkVersion)) {
            $parameters.WdkVersion = $wdkVersion
          }

          if ($parameters.Project -eq 'driver') {
            $parameters.NoBreakpoint = $true
          }

          ./scripts/ci/Build-CrtSys.ps1 @parameters

  driver-load-test-preflight:
    name: Driver load test preflight
    if: github.event_name == 'workflow_dispatch' && inputs.run_driver_load_tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check for an online driver test runner
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUIRED_LABELS: 'self-hosted,windows,x64,crtsys-driver-test'
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys

          required = set(os.environ["REQUIRED_LABELS"].split(","))
          repository = os.environ["GITHUB_REPOSITORY"]
          data = json.loads(subprocess.check_output([
              "gh", "api", f"repos/{repository}/actions/runners"
          ], text=True))

          matches = []
          for runner in data.get("runners", []):
              labels = {label["name"] for label in runner.get("labels", [])}
              if required.issubset(labels):
                  matches.append(runner)

          online = [runner for runner in matches if runner.get("status") == "online"]
          if not online:
              print(
                  "::error::No online self-hosted runner has labels "
                  f"{sorted(required)}. Prepare a Windows x64 runner with "
                  "TESTSIGNING enabled and the crtsys-driver-test label."
              )
              sys.exit(1)

          for runner in online:
              print(f"Using runner candidate: {runner['name']} ({runner['status']})")
          PY

  driver-load-test:
    name: Driver load test x64
    if: github.event_name == 'workflow_dispatch' && inputs.run_driver_load_tests
    needs:
      - build-vs2022
      - driver-load-test-preflight
    # Add the crtsys-driver-test label only to a self-hosted Windows x64 runner
    # that has TESTSIGNING enabled before boot.
    runs-on: [self-hosted, windows, x64, crtsys-driver-test]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Download signed x64 driver
        uses: actions/download-artifact@v4
        with:
          name: crtsys-test-driver-x64
          path: artifacts/driver-x64

      - name: Download x64 test app
        uses: actions/download-artifact@v4
        with:
          name: crtsys-test-app-x64
          path: artifacts/app-x64

      - name: Load driver and run unit tests
        shell: pwsh
        run: >
          ./scripts/ci/Run-DriverTests.ps1
          -DriverPath artifacts\driver-x64\crtsys_test.sys
          -AppPath artifacts\app-x64\crtsys_test_app.exe
